name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm install --no-audit --no-fund
      - run: npm run build

      - name: Install sshpass and trust host
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync build to Hetzner
        env:
          SSHPASS: ${{ secrets.HETZNER_PASSWORD }}
        run: |
          sshpass -e ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} "mkdir -p /home/gelt/apps/tres-en-raya"
          rsync -avz --delete \
            -e "sshpass -e ssh" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.next/cache' \
            ./ ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/home/gelt/apps/tres-en-raya/

      - name: Reload PM2 with correct Node version
        env:
          SSHPASS: ${{ secrets.HETZNER_PASSWORD }}
        run: |
          sshpass -e ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} bash -s <<'EOF'
          set -e
          cd /home/gelt/apps/tres-en-raya
          export NVM_DIR=$HOME/.nvm
          source $NVM_DIR/nvm.sh
          nvm install
          nvm use
          command -v pm2 >/dev/null 2>&1 || npm install -g pm2
          pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
          pm2 save
          EOF

      - name: Update nginx routing for /tres-en-raya
        env:
          SSHPASS: ${{ secrets.HETZNER_PASSWORD }}
        run: |
          sshpass -e ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} bash -s <<'EOF'
          set -e
          mkdir -p /home/gelt/nginx-projects
          echo "" | base64 -d > /home/gelt/nginx-projects/tres-en-raya.conf
          sudo nginx -t
          sudo systemctl reload nginx
          EOF
